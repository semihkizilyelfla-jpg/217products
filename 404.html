<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'none'">
  <meta name="robots" content="noindex, follow">
  <title>Sayfa bulunamadı — 217 Products</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/assets/logo-mark.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #F3ECDC; color: #1E1A16;
      display: grid; place-items: center; text-align: center;
      padding: 40px 22px; -webkit-font-smoothing: antialiased;
    }
    .mark { width: 92px; height: auto; margin: 0 auto 34px; display: block; }
    .code { font-size: 13px; font-weight: 700; letter-spacing: 0.36em; color: #B23A1C; text-transform: uppercase; }
    h1 { font-family: Georgia, "Times New Roman", serif; font-weight: 800; font-size: clamp(30px, 7vw, 56px); line-height: 1.05; margin: 18px 0 14px; }
    p { font-size: clamp(15px, 2.2vw, 18px); color: #6C6154; max-width: 42ch; margin: 0 auto 34px; line-height: 1.6; }
    .home {
      display: inline-flex; align-items: center; gap: 8px; padding: 14px 30px; border-radius: 999px;
      background: #E24B26; color: #fff; text-decoration: none; font-weight: 600; font-size: 15px;
      box-shadow: 0 14px 30px rgba(226,75,38,0.28); transition: transform 0.25s ease, background 0.25s ease;
    }
    .home:hover { transform: translateY(-2px); background: #C13C1B; }
    .sub { margin-top: 20px; font-size: 13px; color: #877B64; }
  </style>
</head>
<body>
  <main>
    <img class="mark" src="/assets/logo-mark.svg" alt="217 Products" width="92" height="92">
    <p class="code">404</p>
    <h1>Bu sayfa büyümedi.<br>This page didn't grow.</h1>
    <p>Aradığın sayfa burada yok — belki taşındı, belki hiç var olmadı. The page you're after isn't here.</p>
    <a class="home" href="/">Ana sayfaya dön · Back home</a>
    <p class="sub">217 Products — Ankara, Türkiye</p>
  </main>
</body>
</html>
